apiVersion: apps/v1
kind: Deployment
metadata:
  name: clientfacing-ui
  labels:
    app: clientfacing-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clientfacing-ui
  template:
    metadata:
      labels:
        app: clientfacing-ui
    spec:
      containers:
        - name: clientfacing-ui
          image: clientfacing-ui
          ports:
            - containerPort: 8080
          env:
            - name: INVENTORY_API_URL
              value: http://inventory-api.production.svc.cluster.local:8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

