name: ArgoCD Deploy

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "ArgoCD Application name"
        required: true
        default: "my-app"
        type: string
      dry_run:
        description: "Only validate, do not apply"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy-argocd-app:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: aaic-opsrabbit-demo
      GKE_CLUSTER: argocd-demo
      GKE_LOCATION: us-central1
      ARGOCD_NAMESPACE: argocd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Check manifest exists
        run: |
          test -f "argocd/applications/${{ inputs.app_name }}.yaml"

      - name: Dry run ArgoCD Application
        if: ${{ inputs.dry_run }}
        run: |
          kubectl apply \
            --namespace "${ARGOCD_NAMESPACE}" \
            --dry-run=server \
            -f "argocd/applications/${{ inputs.app_name }}.yaml"

      - name: Apply ArgoCD Application
        if: ${{ !inputs.dry_run }}
        run: |
          kubectl apply \
            --namespace "${ARGOCD_NAMESPACE}" \
            -f "argocd/applications/${{ inputs.app_name }}.yaml"

      - name: Show application status
        if: ${{ !inputs.dry_run }}
        run: |
          kubectl get application "${{ inputs.app_name }}" \
            -n "${ARGOCD_NAMESPACE}" \
            -o yaml
