name: Build And Update Demo Images

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - ".github/workflows/build-and-update-images.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: build-and-update-demo-images
  cancel-in-progress: true

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      AR_REPO: ${{ vars.GCP_ARTIFACT_REPO }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required GitHub variables
        run: |
          test -n "${PROJECT_ID}" || { echo "Missing vars.GCP_PROJECT_ID"; exit 1; }
          test -n "${REGION}" || { echo "Missing vars.GCP_REGION"; exit 1; }
          test -n "${AR_REPO}" || { echo "Missing vars.GCP_ARTIFACT_REPO"; exit 1; }
          test -n "${WORKLOAD_IDENTITY_PROVIDER}" || { echo "Missing vars.GCP_WORKLOAD_IDENTITY_PROVIDER"; exit 1; }
          test -n "${SERVICE_ACCOUNT}" || { echo "Missing vars.GCP_SERVICE_ACCOUNT"; exit 1; }

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Compute image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "image_tag=sha-${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push clientfacing-ui
        run: |
          gcloud builds submit apps/clientfacing-ui \
            --project "${PROJECT_ID}" \
            --tag "${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/clientfacing-ui:${{ steps.meta.outputs.image_tag }}"

      - name: Build and push inventory-api
        run: |
          gcloud builds submit apps/inventory-api \
            --project "${PROJECT_ID}" \
            --tag "${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/inventory-api:${{ steps.meta.outputs.image_tag }}"

      - name: Update Kubernetes image references
        run: |
          sed -i.bak "s|newTag: .*|newTag: ${{ steps.meta.outputs.image_tag }}|" k8s/clientfacing-ui/overlays/production/kustomization.yaml
          sed -i.bak "s|newTag: .*|newTag: ${{ steps.meta.outputs.image_tag }}|" k8s/inventory-api/overlays/production/kustomization.yaml
          awk '
            /name: APP_VERSION/ {
              print
              getline
              sub(/value: .*/, "              value: ${{ steps.meta.outputs.image_tag }}")
              print
              next
            }
            { print }
          ' k8s/inventory-api/base/deployment.yaml > k8s/inventory-api/base/deployment.yaml.tmp
          mv k8s/inventory-api/base/deployment.yaml.tmp k8s/inventory-api/base/deployment.yaml
          rm -f k8s/clientfacing-ui/overlays/production/kustomization.yaml.bak
          rm -f k8s/inventory-api/overlays/production/kustomization.yaml.bak

      - name: Commit manifest updates
        run: |
          if git diff --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/clientfacing-ui/overlays/production/kustomization.yaml
          git add k8s/inventory-api/overlays/production/kustomization.yaml
          git add k8s/inventory-api/base/deployment.yaml
          git commit -m "chore: update demo image tags to ${{ steps.meta.outputs.image_tag }}"
          git push
